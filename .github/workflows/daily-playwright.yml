name: Daily Playwright Test

on:
  schedule:
    - cron: "0 22 * * *" # täglich 22:00 UTC
  workflow_dispatch:
    inputs:
      host:
        description: "Zu testende Adresse"
        required: false
        default: ""

      account_username:
        description: "Benutzername"
        required: false
        default: ""

      account_password:
        description: "Passwort"
        required: false
        default: ""

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Dependencies installieren
        run: npm ci

      - name: Playwright aktualisieren
        run: npm install -D @playwright/test@latest

      - name: Playwright Browser installieren
        run: npx playwright install --with-deps

      - name: Env-Datei erstellen
        shell: bash
        run: |
          touch .env

          HOST_INPUT="${{ github.event.inputs.host }}"
          USER_INPUT="${{ github.event.inputs.account_username }}"
          PASS_INPUT="${{ github.event.inputs.account_password }}"

          HOST_VALUE="${HOST_INPUT:-${{ secrets.HOST }}}"
          USER_VALUE="${USER_INPUT:-${{ secrets.ACCOUNT_USERNAME }}}"
          PASS_VALUE="${PASS_INPUT:-${{ secrets.ACCOUNT_PASSWORD }}}"

          echo "HOST=$HOST_VALUE" >> .env
          echo "ACCOUNT_USERNAME=$USER_VALUE" >> .env
          echo "ACCOUNT_PASSWORD=$PASS_VALUE" >> .env

      - name: Tests ausführen
        id: run_tests
        continue-on-error: true
        run: npx playwright test

      - name: Mail-Inhalt erstellen
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.run_tests.outcome }}" = "success" ]; then
            echo "MAIL_SUBJECT=Playwright Test - SUCCESS" >> "$GITHUB_ENV"

            cat <<EOF > mail-body.html
            <h2>✅ Playwright Test erfolgreich</h2>

            <p>Alle Tests wurden erfolgreich ausgeführt.</p>

            <p>
              <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                GitHub Action öffnen
              </a>
            </p>
            EOF

          else
            echo "MAIL_SUBJECT=Playwright Test - FAILURE" >> "$GITHUB_ENV"

            cat <<EOF > mail-body.html
            <h2>❌ Playwright Test fehlgeschlagen</h2>

            <p>Mindestens ein Test ist fehlgeschlagen.</p>

            <p>
              <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                GitHub Action öffnen
              </a>
            </p>
            EOF
          fi

      - name: Report hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

      - name: E-Mail senden
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: false

          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: ${{ env.MAIL_SUBJECT }}

          from: ${{ secrets.MAIL_FROM }}

          to: ${{ secrets.MAIL_TO }}

          # OPTIONAL:
          # cc: ${{ secrets.MAIL_TO_2 }}

          html_body: file://mail-body.html

      - name: Workflow fehlschlagen lassen wenn Tests fehlschlagen
        if: steps.run_tests.outcome != 'success'
        run: |
          echo "Mindestens ein Test ist fehlgeschlagen."
          exit 1