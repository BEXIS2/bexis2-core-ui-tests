name: Daily Playwright Test

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      host:
        description: "Zu testende Adresse"
        required: false
        default: ""
      account_username:
        description: "Benutzername"
        required: false
        default: ""
      account_password:
        description: "Passwort"
        required: false
        default: ""

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Dependencies installieren
        run: npm ci

      - name: Playwright Browser installieren
        run: npx playwright install --with-deps

      - name: Env-Datei erstellen
        shell: bash
        run: |
          touch .env

          HOST_INPUT="${{ github.event.inputs.host }}"
          USER_INPUT="${{ github.event.inputs.account_username }}"
          PASS_INPUT="${{ github.event.inputs.account_password }}"

          HOST_VALUE="${HOST_INPUT:-${{ secrets.HOST }}}"
          USER_VALUE="${USER_INPUT:-${{ secrets.ACCOUNT_USERNAME }}}"
          PASS_VALUE="${PASS_INPUT:-${{ secrets.ACCOUNT_PASSWORD }}}"

          echo "HOST=$HOST_VALUE" >> .env
          echo "ACCOUNT_USERNAME=$USER_VALUE" >> .env
          echo "ACCOUNT_PASSWORD=$PASS_VALUE" >> .env

      - name: Tests ausführen
        id: run_tests
        continue-on-error: true
        run: npx playwright test

      - name: Einfache Mail erstellen
        if: always()
        run: |
          if [ "${{ steps.run_tests.outcome }}" = "success" ]; then
            echo "<h2>Playwright Test</h2><p>Status: ✅ Erfolgreich</p><p><a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>GitHub Action öffnen</a></p>" > mail-body.html
          else
            echo "<h2>Playwright Test</h2><p>Status: ❌ Fehlgeschlagen</p><p><a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>GitHub Action öffnen</a></p>" > mail-body.html
          fi

      - name: Report hochladen
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

      - name: E-Mail senden
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Playwright Test - ${{ steps.run_tests.outcome }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          html_body: file://mail-body.html

      - name: Workflow fehlschlagen lassen, wenn Tests fehlgeschlagen sind
        if: steps.run_tests.outcome != 'success'
        run: exit 1